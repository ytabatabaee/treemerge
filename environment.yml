name: treemerge
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # ---- Python ----
  - python=3.9

  # ---- Core numeric stack (PINNED for ABI stability) ----
  - numpy=1.23.*
  - scipy=1.10.*
  - pandas=2.0.3
  - scikit-learn=1.3.2

  # ---- Tree / phylogenetics ----
  - ete3=3.1.3
  - dendropy=4.6.1

  # ---- Bioinformatics ----
  - biopython=1.81

  # ---- utilities ----
  - pip
  - pip:
      - toytree
      - newick
      - tqdm
